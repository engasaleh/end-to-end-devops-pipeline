name: Full Automated CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      # 1. Checkout
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Setup Java
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      # 3. Build
      - name: Build App
        run: |
          cd app
          mvn clean package -DskipTests

      # 4. Docker Login
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 5. Build & Push Image
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/devops-app:${{ github.run_number }}
            ${{ secrets.DOCKER_USERNAME }}/devops-app:latest

      # 6. Update Kubernetes Manifest (safer version)
      - name: Update Kubernetes Manifest
        run: |
          IMAGE="${{ secrets.DOCKER_USERNAME }}/devops-app:${{ github.run_number }}"
          echo "Updating image to $IMAGE"

          sed -i "s|image:.*devops-app.*|image: $IMAGE|g" k8s/deployment.yaml

      # 7. Commit & Push changes (FIXED)
      - name: Commit and Push Changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add k8s/deployment.yaml

          git commit -m "chore: update image tag ${{ github.run_number }} [skip ci]" || exit 0

          git pull origin main --rebase

          git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git HEAD:main