name: Full Automated CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    # السماح للأكشن إنه يعمل Push للتغييرات (مهمة لخطوة الـ GitOps)
    permissions:
      contents: write

    steps:
      # 1. سحب الكود
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. إعداد الجافا (استخدمنا النسخة اللي أنت شغال بيها 21)
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven' # إضافة كاش لتسريع الـ Build في المرات الجاية

      # 3. بناء المشروع وتجهيز الـ Jar
      - name: Build App with Maven
        run: |
          cd app
          mvn clean package -DskipTests

      # 4. تسجيل الدخول على Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3 # الطريقة الأحدث والآمن بدلاً من الـ echo
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 5. بناء ورفع الـ Docker Image برقم الإصدار و Latest
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/devops-app:${{ github.run_number }}
            ${{ secrets.DOCKER_USERNAME }}/devops-app:latest

      # 6. تحديث ملف الـ Deployment (خطوة الـ GitOps السحرية)
      - name: Update Kubernetes Manifest
        run: |
          # التعديل بيتم باستخدام sed لتغيير الـ image tag للرقم الجديد
          sed -i "s|image: .*|image: ${{ secrets.DOCKER_USERNAME }}/devops-app:${{ github.run_number }}|g" k8s/deployment.yaml

      # 7. حفظ التعديل في الجيت هاب (عشان الكلاستر يحس بالتغيير)
      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/deployment.yaml
          git commit -m "chore: update image tag to build ${{ github.run_number }} [skip ci]" || echo "No changes to commit"
          git push