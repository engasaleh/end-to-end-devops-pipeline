name: CI Pipeline

on:
  push:
    branches:
      - "main"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Setup Java
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      # 3. Build
      - name: Build App
        run: |
          cd app
          mvn clean package -DskipTests

      # 4. Docker Login
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 5. Build & Push Image
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/devops-app:${{ github.run_number }}
            ${{ secrets.DOCKER_USERNAME }}/devops-app:latest

      # 6. Update GitOps Repo
      - name: Update GitOps Repo
        run: |
          echo "Cloning GitOps repo..."

          git clone https://x-access-token:${{ secrets.GITOPS_TOKEN }}@github.com/engasaleh/end-to-end-devops-gitops.git

          cd end-to-end-devops-gitops

          IMAGE="${{ secrets.DOCKER_USERNAME }}/devops-app:${{ github.run_number }}"
          echo "Updating image to $IMAGE"

          sed -i "s|image:.*devops-app.*|image: $IMAGE|g" k8s/deployment.yaml

          git config user.name "engasaleh"
          git config user.email "abdalahsaleh99@gmail.com"

          git add .
          git commit -m "Update image to ${{ github.run_number }}" || exit 0

          git push